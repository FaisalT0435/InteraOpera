apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: meridian
  labels:
    app: rag-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-qdrant
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://qdrant:6333/healthz > /dev/null 2>&1; do
                echo "Waiting for Qdrant..."; sleep 3;
              done
              echo "Qdrant is ready."
      containers:
        - name: rag-api
          image: meridian-rag-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_SERVER_URL
              value: "http://model-server:8001"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: CORPUS_DIR
              value: "/corpus"
            - name: AUTO_INGEST
              value: "true"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: corpus
              mountPath: /corpus
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: corpus
          configMap:
            name: corpus-files
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: meridian
  labels:
    app: rag-api
spec:
  selector:
    app: rag-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30801
      name: http
  type: NodePort
