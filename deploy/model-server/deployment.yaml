apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
  namespace: meridian
  labels:
    app: model-server
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: model-server
          image: meridian-slm:1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_VERSION
              value: "1.0"
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: model-server
  namespace: meridian
  labels:
    app: model-server
spec:
  selector:
    app: model-server
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  # ClusterIP only — /admin/fault never exposed publicly
  type: ClusterIP
